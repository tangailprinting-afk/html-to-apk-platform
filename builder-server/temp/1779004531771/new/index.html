



    <!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro File Manager - মাল্টি-ইউজার ফাইল ম্যানেজার</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #06b6d4;
            --primary-dark: #0891b2;
            --bg: #f8fafc;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --white: #ffffff;
            --danger: #ef4444;
            --success: #22c55e;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #f8fafc 100%);
            color: var(--text);
            min-height: 100vh;
        }

        /* Header */
        header {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .logo i {
            font-size: 1.75rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-name {
            font-weight: 600;
            color: var(--text);
        }

        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--white);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.3);
        }

        .btn-secondary {
            background: var(--white);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: #f1f5f9;
        }

        .btn-danger {
            background: var(--danger);
            color: var(--white);
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-small {
            padding: 0.375rem 0.75rem;
            font-size: 0.75rem;
        }

        /* Auth Container */
        #auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .auth-box {
            background: var(--white);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 400px;
        }

        .auth-box h2 {
            margin-bottom: 1.5rem;
            text-align: center;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.875rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
        }

        .toggle-auth {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.875rem;
        }

        .toggle-auth a {
            color: var(--primary);
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
        }

        .toggle-auth a:hover {
            text-decoration: underline;
        }

        /* Main Container */
        #main-container {
            display: none;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            padding: 1rem;
            background: var(--white);
            border-radius: 0.75rem;
            border: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .breadcrumb-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            border-radius: 0.375rem;
            transition: background 0.2s;
        }

        .breadcrumb-item:hover {
            background: #f1f5f9;
        }

        .breadcrumb-item a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .breadcrumb-separator {
            color: var(--text-light);
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            font-size: 0.875rem;
        }

        .search-box i {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
        }

        .toolbar-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        #file-input {
            display: none;
        }

        /* Drop Zone */
        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 1rem;
            padding: 3rem 2rem;
            text-align: center;
            margin-bottom: 2rem;
            transition: all 0.2s;
            background: rgba(6, 182, 212, 0.02);
        }

        .drop-zone.active {
            border-color: var(--primary);
            background: rgba(6, 182, 212, 0.08);
        }

        .drop-zone i {
            font-size: 2.5rem;
            color: var(--text-light);
            margin-bottom: 1rem;
        }

        .drop-zone p {
            color: var(--text-light);
            margin: 0.5rem 0;
        }

        /* File Grid */
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .file-item {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
        }

        .file-item:hover {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.15);
            transform: translateY(-2px);
        }

        .file-item.selected {
            background: rgba(6, 182, 212, 0.05);
            border-color: var(--primary);
        }

        .file-item-checkbox {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 1.25rem;
            height: 1.25rem;
            cursor: pointer;
        }

        .file-item-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            display: inline-block;
        }

        .file-item-name {
            font-weight: 600;
            margin-bottom: 0.5rem;
            word-break: break-word;
            font-size: 0.875rem;
        }

        .file-item-meta {
            font-size: 0.75rem;
            color: var(--text-light);
            margin-bottom: 1rem;
        }

        .file-item-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .file-item-actions button {
            flex: 1;
            padding: 0.5rem;
            border: none;
            border-radius: 0.375rem;
            background: #f1f5f9;
            color: var(--text);
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
        }

        .file-item-actions button:hover {
            background: #e2e8f0;
        }

        .file-item-actions button.delete:hover {
            background: var(--danger);
            color: var(--white);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: var(--white);
            border-radius: 1rem;
            border: 1px solid var(--border);
        }

        .empty-state i {
            font-size: 3rem;
            color: var(--text-light);
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .empty-state p {
            color: var(--text-light);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--white);
            border-radius: 1rem;
            padding: 2rem;
            max-width: 500px;
            width: 100%;
            box-shadow: var(--shadow-lg);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h2 {
            font-size: 1.25rem;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-light);
        }

        /* Image Preview */
        .preview-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1001;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .preview-modal.active {
            display: flex;
        }

        .preview-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 0.5rem;
        }

        .preview-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--white);
            border: none;
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Loading */
        .loading {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(6, 182, 212, 0.3);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }

            .file-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }

            .toolbar {
                flex-direction: column;
            }

            .search-box {
                min-width: 100%;
            }

            .toolbar-actions {
                width: 100%;
            }

            .toolbar-actions button {
                flex: 1;
            }
        }

        .hidden {
            display: none !important;
        }

        .alert {
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .alert-success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header id="header" class="hidden">
        <div class="header-content">
            <div class="logo">
                <i class="fas fa-folder"></i>
                <span>Pro File Manager</span>
            </div>
            <div class="user-info">
                <span class="user-name" id="user-name"></span>
                <button class="btn btn-secondary btn-small" onclick="app.logout()">
                    <i class="fas fa-sign-out-alt"></i> লগআউট
                </button>
            </div>
        </div>
    </header>

    <!-- Auth Container -->
    <div id="auth-container">
        <div class="auth-box">
            <div id="login-form">
                <h2>লগইন করুন</h2>
                <div class="form-group">
                    <label>ইমেইল</label>
                    <input type="email" id="login-email" placeholder="আপনার ইমেইল">
                </div>
                <div class="form-group">
                    <label>পাসওয়ার্ড</label>
                    <input type="password" id="login-password" placeholder="আপনার পাসওয়ার্ড">
                </div>
                <button class="btn btn-primary" style="width: 100%; margin-bottom: 1rem;" onclick="app.login()">
                    লগইন করুন
                </button>
                <div class="toggle-auth">
                    নতুন ব্যবহারকারী? <a onclick="app.toggleAuth()">সাইন আপ করুন</a>
                </div>
            </div>

            <div id="signup-form" class="hidden">
                <h2>সাইন আপ করুন</h2>
                <div class="form-group">
                    <label>নাম</label>
                    <input type="text" id="signup-name" placeholder="আপনার নাম">
                </div>
                <div class="form-group">
                    <label>ইমেইল</label>
                    <input type="email" id="signup-email" placeholder="আপনার ইমেইল">
                </div>
                <div class="form-group">
                    <label>পাসওয়ার্ড</label>
                    <input type="password" id="signup-password" placeholder="শক্তিশালী পাসওয়ার্ড">
                </div>
                <button class="btn btn-primary" style="width: 100%; margin-bottom: 1rem;" onclick="app.signup()">
                    সাইন আপ করুন
                </button>
                <div class="toggle-auth">
                    ইতিমধ্যে অ্যাকাউন্ট আছে? <a onclick="app.toggleAuth()">লগইন করুন</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Container -->
    <div id="main-container">
        <!-- Breadcrumb -->
        <div class="breadcrumb" id="breadcrumb">
            <div class="breadcrumb-item" onclick="app.navigateHome()">
                <i class="fas fa-home"></i>
                <a>হোম</a>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="ফাইল খুঁজুন..." onkeyup="app.filterFiles()">
            </div>
            <div class="toolbar-actions">
                <button class="btn btn-secondary" onclick="app.showNewFolderModal()">
                    <i class="fas fa-folder-plus"></i> নতুন ফোল্ডার
                </button>
                <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">
                    <i class="fas fa-cloud-upload-alt"></i> ফাইল আপলোড
                </button>
                <input type="file" id="file-input" multiple onchange="app.handleFileUpload(event)">
            </div>
        </div>

        <!-- Drop Zone -->
        <div class="drop-zone" id="drop-zone">
            <i class="fas fa-cloud-upload-alt"></i>
            <p><strong>ফাইল এখানে ড্র্যাগ করুন</strong></p>
            <p style="font-size: 0.875rem;">অথবা আপলোড বাটনে ক্লিক করুন</p>
        </div>

        <!-- File Grid -->
        <div class="file-grid" id="file-grid"></div>

        <!-- Empty State -->
        <div class="empty-state" id="empty-state" style="display: none;">
            <i class="fas fa-inbox"></i>
            <h3>কোনো ফাইল নেই</h3>
            <p>এই ফোল্ডারে এখনো কোনো ফাইল বা ফোল্ডার নেই</p>
        </div>
    </div>

    <!-- New Folder Modal -->
    <div class="modal" id="new-folder-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>নতুন ফোল্ডার তৈরি করুন</h2>
                <button class="modal-close" onclick="app.closeModal('new-folder-modal')">×</button>
            </div>
            <div class="form-group">
                <label>ফোল্ডার নাম</label>
                <input type="text" id="folder-name" placeholder="ফোল্ডারের নাম লিখুন">
            </div>
            <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                <button class="btn btn-secondary" onclick="app.closeModal('new-folder-modal')">বাতিল</button>
                <button class="btn btn-primary" onclick="app.createFolder()">তৈরি করুন</button>
            </div>
        </div>
    </div>

    <!-- Image Preview Modal -->
    <div class="preview-modal" id="preview-modal">
        <button class="preview-close" onclick="app.closePreview()">×</button>
        <img id="preview-image" src="" alt="Preview">
    </div>

    <script>
        // Configuration
     const SUPABASE_URL = "https://dhzjoznlvjrndoiniazw.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRoempvem5sdmpybmRvaW5pYXp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MzM5MjMsImV4cCI6MjA5NDMwOTkyM30.bUrIZDQ8u_bOFhOu6tO-FUoL4_VpcGgVF1exKnU6rIQ";
    const WORKER_URL = "https://cdn.downloadserverbd.com";

        // Initialize Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // App State
        const app = {
            currentUser: null,
            currentPath: [],
            allFiles: [],
            filteredFiles: [],

            // Initialize
            async init() {
                const { data: { user } } = await supabase.auth.getUser();
                if (user) {
                    this.currentUser = user;
                    this.showMainContainer();
                    this.loadFiles();
                    document.getElementById('user-name').textContent = user.user_metadata?.name || user.email;
                } else {
                    this.showAuthContainer();
                }
            },

            // Auth Methods
            async login() {
                const email = document.getElementById('login-email').value;
                const password = document.getElementById('login-password').value;

                if (!email || !password) {
                    alert('সব ফিল্ড পূরণ করুন');
                    return;
                }

                const { error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) {
                    alert('লগইন ব্যর্থ: ' + error.message);
                } else {
                    this.init();
                }
            },

            async signup() {
                const name = document.getElementById('signup-name').value;
                const email = document.getElementById('signup-email').value;
                const password = document.getElementById('signup-password').value;

                if (!name || !email || !password) {
                    alert('সব ফিল্ড পূরণ করুন');
                    return;
                }

                const { error } = await supabase.auth.signUp({
                    email,
                    password,
                    options: {
                        data: { name }
                    }
                });

                if (error) {
                    alert('সাইন আপ ব্যর্থ: ' + error.message);
                } else {
                    alert('সাইন আপ সফল! এখন লগইন করুন');
                    this.toggleAuth();
                }
            },

            async logout() {
                await supabase.auth.signOut();
                this.currentUser = null;
                this.currentPath = [];
                this.allFiles = [];
                this.init();
            },

            toggleAuth() {
                document.getElementById('login-form').classList.toggle('hidden');
                document.getElementById('signup-form').classList.toggle('hidden');
            },

            showAuthContainer() {
                document.getElementById('auth-container').style.display = 'flex';
                document.getElementById('main-container').style.display = 'none';
                document.getElementById('header').classList.add('hidden');
            },

            showMainContainer() {
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('main-container').style.display = 'block';
                document.getElementById('header').classList.remove('hidden');
            },

            // File Methods
            async loadFiles() {
                const path = this.currentPath.join('/');
                
                // Load from Supabase or localStorage
                const stored = localStorage.getItem(`files_${this.currentUser.id}_${path}`);
                if (stored) {
                    this.allFiles = JSON.parse(stored);
                } else {
                    this.allFiles = [];
                }

                this.displayFiles();
            },

            displayFiles() {
                const grid = document.getElementById('file-grid');
                const empty = document.getElementById('empty-state');

                if (this.filteredFiles.length === 0) {
                    grid.innerHTML = '';
                    empty.style.display = 'block';
                } else {
                    empty.style.display = 'none';
                    grid.innerHTML = this.filteredFiles.map(file => this.createFileElement(file)).join('');
                }
            },

            createFileElement(file) {
                const icon = file.type === 'folder' 
                    ? 'fas fa-folder' 
                    : this.getFileIcon(file.name);

                return `
                    <div class="file-item" data-id="${file.id}">
                        <input type="checkbox" class="file-item-checkbox" data-id="${file.id}">
                        <div style="text-align: center;">
                            <div class="file-item-icon">
                                <i class="${icon}"></i>
                            </div>
                            <div class="file-item-name">${file.name}</div>
                            <div class="file-item-meta">
                                ${file.type === 'folder' ? 'ফোল্ডার' : this.formatFileSize(file.size)}
                                <br>
                                ${new Date(file.uploadedAt).toLocaleDateString('bn-BD')}
                            </div>
                        </div>
                        <div class="file-item-actions">
                            ${file.type === 'folder' 
                                ? `<button onclick="app.openFolder('${file.id}')">খুলুন</button>` 
                                : `<button onclick="app.downloadFile('${file.id}')">ডাউনলোড</button>`
                            }
                            ${file.mimeType?.startsWith('image/') 
                                ? `<button onclick="app.previewImage('${file.id}')">প্রিভিউ</button>` 
                                : ''
                            }
                            <button class="delete" onclick="app.deleteFile('${file.id}')">ডিলিট</button>
                        </div>
                    </div>
                `;
            },

            getFileIcon(filename) {
                const ext = filename.split('.').pop().toLowerCase();
                const iconMap = {
                    'pdf': 'fas fa-file-pdf',
                    'doc': 'fas fa-file-word',
                    'docx': 'fas fa-file-word',
                    'xls': 'fas fa-file-excel',
                    'xlsx': 'fas fa-file-excel',
                    'ppt': 'fas fa-file-powerpoint',
                    'pptx': 'fas fa-file-powerpoint',
                    'jpg': 'fas fa-image',
                    'jpeg': 'fas fa-image',
                    'png': 'fas fa-image',
                    'gif': 'fas fa-image',
                    'mp3': 'fas fa-music',
                    'mp4': 'fas fa-video',
                    'zip': 'fas fa-file-archive',
                    'rar': 'fas fa-file-archive',
                };
                return iconMap[ext] || 'fas fa-file';
            },

            formatFileSize(bytes) {
                if (!bytes) return '-';
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
                return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
            },

            async handleFileUpload(event) {
                const files = event.target.files;
                if (!files) return;

                for (let file of files) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const newFile = {
                            id: Date.now().toString() + Math.random(),
                            name: file.name,
                            type: 'file',
                            size: file.size,
                            mimeType: file.type,
                            uploadedAt: new Date().toISOString(),
                            path: this.currentPath.join('/'),
                            data: e.target.result
                        };

                        this.allFiles.push(newFile);
                        this.saveFiles();
                        this.filterFiles();
                    };
                    reader.readAsArrayBuffer(file);
                }

                event.target.value = '';
            },

            showNewFolderModal() {
                document.getElementById('new-folder-modal').classList.add('active');
                document.getElementById('folder-name').focus();
            },

            async createFolder() {
                const name = document.getElementById('folder-name').value;
                if (!name) {
                    alert('ফোল্ডার নাম লিখুন');
                    return;
                }

                const newFolder = {
                    id: Date.now().toString(),
                    name: name,
                    type: 'folder',
                    uploadedAt: new Date().toISOString(),
                    path: this.currentPath.join('/')
                };

                this.allFiles.push(newFolder);
                this.saveFiles();
                this.filterFiles();
                this.closeModal('new-folder-modal');
                document.getElementById('folder-name').value = '';
            },

            openFolder(folderId) {
                const folder = this.allFiles.find(f => f.id === folderId);
                if (folder && folder.type === 'folder') {
                    this.currentPath.push(folder.name);
                    this.updateBreadcrumb();
                    this.loadFiles();
                }
            },

            navigateHome() {
                this.currentPath = [];
                this.updateBreadcrumb();
                this.loadFiles();
            },

            updateBreadcrumb() {
                const breadcrumb = document.getElementById('breadcrumb');
                let html = `<div class="breadcrumb-item" onclick="app.navigateHome()">
                    <i class="fas fa-home"></i>
                    <a>হোম</a>
                </div>`;

                this.currentPath.forEach((folder, index) => {
                    html += `
                        <span class="breadcrumb-separator"><i class="fas fa-chevron-right"></i></span>
                        <div class="breadcrumb-item" onclick="app.navigateToPath(${index})">
                            <a>${folder}</a>
                        </div>
                    `;
                });

                breadcrumb.innerHTML = html;
            },

            navigateToPath(index) {
                this.currentPath = this.currentPath.slice(0, index + 1);
                this.updateBreadcrumb();
                this.loadFiles();
            },

            filterFiles() {
                const query = document.getElementById('search-input').value.toLowerCase();
                const path = this.currentPath.join('/');

                this.filteredFiles = this.allFiles.filter(file => {
                    const inCurrentPath = file.path === path;
                    const matchesSearch = file.name.toLowerCase().includes(query);
                    return inCurrentPath && matchesSearch;
                });

                this.displayFiles();
            },

            async downloadFile(fileId) {
                const file = this.allFiles.find(f => f.id === fileId);
                if (file && file.data) {
                    const link = document.createElement('a');
                    link.href = file.data;
                    link.download = file.name;
                    link.click();
                }
            },

            previewImage(fileId) {
                const file = this.allFiles.find(f => f.id === fileId);
                if (file && file.mimeType?.startsWith('image/')) {
                    document.getElementById('preview-image').src = file.data;
                    document.getElementById('preview-modal').classList.add('active');
                }
            },

            closePreview() {
                document.getElementById('preview-modal').classList.remove('active');
            },

            async deleteFile(fileId) {
                if (confirm('এটি ডিলিট করতে চান?')) {
                    this.allFiles = this.allFiles.filter(f => f.id !== fileId);
                    this.saveFiles();
                    this.filterFiles();
                }
            },

            saveFiles() {
                const path = this.currentPath.join('/');
                localStorage.setItem(`files_${this.currentUser.id}_${path}`, JSON.stringify(this.allFiles));
            },

            closeModal(modalId) {
                document.getElementById(modalId).classList.remove('active');
            }
        };

        // Setup drag and drop
        const dropZone = document.getElementById('drop-zone');
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('active');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('active');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('active');
            const files = e.dataTransfer.files;
            document.getElementById('file-input').files = files;
            app.handleFileUpload({ target: { files } });
        });

        // Initialize app
        app.init();
    </script>
</body>
</html>
