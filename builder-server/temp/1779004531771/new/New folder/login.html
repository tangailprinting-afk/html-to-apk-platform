<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লগইন - Pro File Manager</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <span class="logo-icon">📁</span>
                <h1>Pro File Manager</h1>
                <p>আপনার ফাইল সংরক্ষণ করুন সুরক্ষিতভাবে</p>
            </div>

            <form class="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">ইমেইল</label>
                    <input type="email" id="email" placeholder="আপনার ইমেইল" required>
                </div>

                <div class="form-group">
                    <label for="password">পাসওয়ার্ড</label>
                    <input type="password" id="password" placeholder="আপনার পাসওয়ার্ড" required>
                </div>

                <div class="remember-me">
                    <input type="checkbox" id="remember" checked>
                    <label for="remember">আমাকে মনে রাখুন</label>
                </div>

                <button type="submit" class="btn btn-primary full-width">লগইন করুন</button>
            </form>

            <div class="login-footer">
                <p>অ্যাকাউন্ট নেই? <a href="register.html">রেজিস্ট্রেশন করুন</a></p>
                <p><a href="#">পাসওয়ার্ড ভুলে গেছেন?</a></p>
            </div>

            <div id="errorMessage" class="error-message" style="display: none;"></div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
